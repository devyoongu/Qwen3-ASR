services:
  qwen3-asr-streaming:
    image: qwenllm/qwen3-asr:latest
    container_name: qwen3-asr-streaming
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    volumes:
      - /home/posicube/.cache/huggingface/hub:/app/models
      - /home/posicube/stt/Qwen3-ASR:/app/src
    ports:
      - "30000:30000"
    # 소스코드를 마운트해 컨테이너 시작 시 패키지를 재설치한 뒤 서버를 실행합니다.
    command: >
      bash -c "pip install -e /app/src --no-deps --quiet &&
               qwen-asr-serve-async
               --asr-model-path /app/models
               --host 0.0.0.0
               --port 30000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
